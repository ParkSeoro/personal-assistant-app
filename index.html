<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="쟈비스 - 인공지능 기반 개인 비서 앱">
    <meta name="keywords" content="AI, 개인 비서, 쟈비스, 인공지능, 비서 앱">
    <meta name="author" content="Manus">
    <title>쟈비스 - 개인 비서 앱</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="additional-styles.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>쟈비스</h1>
            <p>당신만의 AI 개인 비서</p>
        </header>
        
        <div class="assistant-container">
            <div class="assistant-avatar">
                <div class="avatar-circle"></div>
            </div>
            
            <div class="chat-container">
                <div id="chat-messages" class="chat-messages">
                    <!-- 메시지가 여기에 표시됩니다 -->
                </div>
                
                <div class="input-container">
                    <input type="text" id="user-input" placeholder="무엇을 도와드릴까요?">
                    <button id="voice-input-btn">
                        <span class="mic-icon">🎤</span>
                    </button>
                    <button id="send-btn">전송</button>
                </div>
            </div>
        </div>
        
        <div class="features-container">
            <div class="feature-card">
                <h3>일정 관리</h3>
                <div id="calendar-widget" class="widget">
                    <!-- 캘린더 위젯 -->
                </div>
            </div>
            
            <div class="feature-card">
                <h3>감정 분석</h3>
                <div id="mood-widget" class="widget">
                    <!-- 감정 분석 위젯 -->
                </div>
            </div>
            
            <div class="feature-card">
                <h3>인사이트</h3>
                <div id="insights-widget" class="widget">
                    <!-- 인사이트 위젯 -->
                </div>
            </div>
        </div>
        
        <footer>
            <p>© 2025 쟈비스 AI 비서 앱 | <a href="https://github.com/yourusername/personal-assistant-app" target="_blank">GitHub</a></p>
            <p>인공지능 기반 개인 비서 앱 - 일정 관리, 감정 분석, 인사이트 제공</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
